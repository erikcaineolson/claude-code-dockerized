services:
  claude:
    build:
      context: .
    container_name: claude-code
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount your project workspace
      - ./workspace:/workspace
      # Persist Claude Code config between runs
      # WARNING: This volume stores settings.json which may contain API keys.
      # Use `docker volume rm claude-code-dockerized_claude-config` to purge.
      - claude-config:/home/node/.claude
    working_dir: /workspace

volumes:
  claude-config:
